name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Stage static site files
        run: |
          rm -rf .swa/site
          mkdir -p .swa/site
          rsync -a --delete \
            --include '/index.html' \
            --include '/app.js' \
            --include '/styles.css' \
            --include '/assets/' \
            --include '/assets/***' \
            --exclude '*' \
            ./ .swa/site/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /.swa/site
          skip_app_build: true
